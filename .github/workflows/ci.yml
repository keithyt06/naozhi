name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Cancel in-progress runs on the same ref to save CI budget.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 300s ./...

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Vulnerability findings should be visible but not block feature PRs;
    # operators review them asynchronously.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  # darwin hard gate: catches proc_darwin.go / sdnotify_darwin / symlink
  # path divergences that pass Linux silently (e.g. /var → /private/var).
  # Promoted from soft gate (continue-on-error) after tool_result symlink
  # fix confirmed zero flakes on 2026-05-15.
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (darwin hard gate)
        run: go build ./...

      - name: Test
        run: go test -race -timeout 300s -short ./...

  # RNEW-TEST-432: Windows build-only job. Not a supported runtime — the
  # gate exists to surface regressions in packages that must compile on
  # all platforms. Shim/discovery syscall isolation was completed 2026-05-15
  # (_unix.go / _windows.go build-tag split), so this is now a hard gate.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...
