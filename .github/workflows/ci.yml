name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  issues: write   # needed by the vuln job to open/comment on security issues

# Cancel in-progress runs on the same ref to save CI budget.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 300s ./...

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Vulnerability findings do not block feature PRs — operators review
    # asynchronously. A GitHub Issue is opened automatically on failure so
    # findings are not silently lost.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        id: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: Open issue on vulnerability findings
        if: failure() && github.ref == 'refs/heads/master'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[vuln] govulncheck findings on ${context.sha.slice(0,7)}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
            });
            const existing = issues.find(i => i.title.startsWith('[vuln]'));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `New findings on ${context.sha.slice(0,7)} — [run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `govulncheck found vulnerabilities on master.\n\n**Commit:** ${context.sha}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nReview the run log and update affected dependencies.`,
                labels: ['security', 'automated'],
              });
            }

  # darwin hard gate: catches proc_darwin.go / sdnotify_darwin / symlink
  # path divergences that pass Linux silently (e.g. /var → /private/var).
  # Promoted from soft gate (continue-on-error) after tool_result symlink
  # fix confirmed zero flakes on 2026-05-15.
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (darwin hard gate)
        run: go build ./...

      - name: Test
        run: go test -race -timeout 300s -short ./...

  # RNEW-TEST-432: Windows build-only job. Not a supported runtime — the
  # gate exists to surface regressions in packages that must compile on
  # all platforms. Shim/discovery syscall isolation was completed 2026-05-15
  # (_unix.go / _windows.go build-tag split), so this is now a hard gate.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...
