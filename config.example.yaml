# naozhi config.example.yaml — copy to config.yaml before first run.
#
# ============================================================================
# Configuration precedence (RNEW-ARCH-405)
# ============================================================================
# Values are resolved top-down; later sources override earlier ones when the
# same field is set in multiple places.
#
#   1. Built-in defaults         in internal/config/config.go (applyDefaults)
#   2. config.yaml               this file (--config flag path)
#   3. ~/.claude/settings.json   a subset of Claude CLI env vars (proxy, API
#                                base URL) gets injected into os.Environ
#                                before CLI spawn. Applied by
#                                cmd/naozhi/main.go applyClaudeEnvSettings.
#   4. .naozhi/<project>.yaml    per-project overrides when a CWD matches a
#                                project entry. Only the planner_defaults
#                                subset is respected.
#   5. Environment variables     `${VAR}` expansion happens in *this* YAML
#                                at load time, and a handful of runtime
#                                knobs (NAOZHI_DASHBOARD_TOKEN,
#                                TZ, HOME …) are read directly via
#                                os.Getenv.
#   6. CLI flags                 `--config`, `--log-level`, `--doctor`,
#                                `--install`; these always win.
#
# Two-name compatibility:
#   - `nodes:` and `reverse_nodes:` are treated as synonyms; pick one.
#   - `workspaces:` and `projects:` map to the same Project registry.
#   - `session.cwd` and `session.workspace` both set the default CWD.
#
# When in doubt: `sudo NAOZHI_DASHBOARD_TOKEN=xxx bin/naozhi --config …
# --doctor` prints the effective resolved config.
# ============================================================================

server:
  addr: ":8180"
  dashboard_token: "${NAOZHI_DASHBOARD_TOKEN}"
  trusted_proxy: true

workspace:
  id: "your-node-id"
  name: "Your Node Name"

cli:
  path: "~/.local/bin/claude"
  # --dangerously-skip-permissions is always applied by protocol_claude.go; no need to repeat here.
  # Naozhi's dashboard markdown renderer escapes raw HTML as a security
  # measure (see dashboard.js renderMdUncached + inlineMd), so <details>,
  # <summary>, <kbd>, <sub>, <sup> etc. render as literal text instead of
  # collapsible widgets. Instruct the model to stick to pure Markdown.
  args: []

  # Optional: multiple backends in one deployment (RNEW-DOC-421).
  #
  # When to use: you want a single naozhi instance to spawn more than one
  # CLI flavor (Claude stream-json + Kiro ACP, or Claude + Gemini) so the
  # dashboard "new session" picker can choose per-session which backend
  # runs each conversation. The per-request override travels via
  # /api/cli/backends + the `backend` field on /api/sessions/send; when
  # omitted the router falls back to the default below.
  #
  # Authority: pick one layout per deployment — either the legacy
  # single-backend (cli.path + cli.model + cli.args above, with no
  # `backends:` block) OR the multi-backend form (cli.backends + optional
  # cli.backend for the default). Leaving both populated is legal — the
  # per-backend fields just inherit from the top-level cli.* values — but
  # mixing them makes the effective config hard to reason about. If you
  # enable `backends:`, treat cli.path/model/args as inheritable defaults
  # only, not as "the real backend".
  #
  # Runtime selection:
  #   - Dashboard "new session" dropdown picks backend per session
  #   - API: POST /api/sessions/send {"backend": "kiro", ...}
  #   - Omitted => cli.backend (or first entry in `backends:`)
  #
  # Per-backend path/model/args are optional and fall back to cli.* above.
  # ACP protocol is auto-selected for id="kiro"; stream-json for everything
  # else — no extra flag needed.
  #
  #backend: "claude"
  #backends:
  #  - id: "claude"
  #    # path/model/args inherit from cli.path + cli.args above when omitted.
  #  - id: "kiro"
  #    path: "~/.local/bin/kiro"
  #    model: "anthropic.claude-sonnet-4-5"
  #    args: []

session:
  max_procs: 20
  ttl: "30m"
  prune_ttl: "72h"
  cwd: "/path/to/your/workspace"
  watchdog:
    no_output_timeout: "1800s"
    total_timeout: "14400s"
  store_path: "~/.naozhi/sessions.json"
  shim:
    idle_timeout: "8h"
  queue:
    # Message queuing when a session is busy. Three modes:
    #   collect     (default) — queue new messages, wait for current turn,
    #                 merge into a single follow-up prompt after a settle delay
    #   interrupt   — auto-abort the current turn on every new message; burns
    #                 tokens but minimizes response latency
    #   passthrough — forward every message directly to the CLI; each message
    #                 gets its own result (or a merged group result with
    #                 head/follower IM fan-out). Requires stream-json backend
    #                 (Claude CLI). ACP backends silently fall back to collect.
    #                 Enables /urgent <msg> for priority:"now" preemption.
    mode: "collect"
    max_depth: 20
    collect_delay: "500ms"

agents:
  code-reviewer:
    model: "sonnet"
    args: ["--append-system-prompt", "You are a code review expert. Review code for quality, security, and maintainability."]
  researcher:
    model: "opus"
    args: ["--append-system-prompt", "You are a deep research expert. Decompose questions, search from multiple angles, and synthesize findings."]

agent_commands:
  review: "code-reviewer"
  research: "researcher"

cron:
  store_path: "~/.naozhi/cron_jobs.json"
  max_jobs: 50
  # Per-job timeout is schedule_period × 0.8, clamped to [3m, execution_timeout].
  # Set this to the longest period you schedule × 0.8 (or slightly more) so long
  # schedules get their full proportional budget; short schedules auto-scale down.
  execution_timeout: "8h"
  # IANA timezone for interpreting cron expressions (e.g. "0 9 * * *" = 9am in this zone).
  # Empty / "Local" uses the system local time (respects $TZ). Examples: "Asia/Shanghai", "UTC".
  timezone: "Asia/Shanghai"
  # Fallback IM target for jobs that opt into completion notifications via the
  # dashboard toggle but don't specify a per-job target. Both fields required.
  # Leave empty to disable the default (per-job targets still work).
  notify_default:
    platform: "feishu"
    chat_id: "${NAOZHI_CRON_NOTIFY_CHAT_ID}"
  # 调度抖动上限：多个同 schedule 的 job 不再"整点同秒起跑"，而是在
  # [0, min(jitter_max, period/4)] 区间内随机延迟，拍平 CPU / API 并发峰值。
  # 默认 2m。"0" 关闭抖动（回退到 v1 行为）。上限硬编码 10m。TriggerNow
  # （dashboard 的 "run now" 按钮）始终跳过抖动立即执行。
  jitter_max: "2m"

platforms:
  feishu:
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
    encrypt_key: "${FEISHU_ENCRYPT_KEY}"
    max_reply_length: 4000

log:
  level: "info"

transcribe:
  enabled: true
  region: "ap-northeast-1"
  language: "zh-CN,en-US"

projects:
  root: "/path/to/your/workspace"
  planner_defaults:
    model: "sonnet"

# Reverse-connect nodes: remote machines dial in to this primary (NAT traversal).
# Each entry is node_id: {token, display_name}. Token must match upstream.token on the remote.
